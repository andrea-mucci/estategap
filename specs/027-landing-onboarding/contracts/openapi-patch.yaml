# OpenAPI Contract Patch: Landing Page & User Onboarding (027)
#
# These changes are to be merged into services/api-gateway/openapi.yaml
# and reflected in the Go handler + frontend generated types.

# --- SECTION 1: UserProfile schema (components/schemas/UserProfile) ---
# Add onboarding_completed field to the existing UserProfile schema.
#
# Patch target: components.schemas.UserProfile.properties
# Add after email_verified:

UserProfile_properties_additions:
  onboarding_completed:
    type: boolean
    description: >
      Whether the user has completed (or explicitly skipped) the new-user
      onboarding tour. False for all new registrations.
    example: false
  preferred_currency:
    type: string
    description: User's preferred display currency (ISO 4217).
    example: EUR

# Also add to required array:
UserProfile_required_additions:
  - onboarding_completed
  - preferred_currency

# --- SECTION 2: PATCH /api/v1/auth/me request body ---
# Replace the currently undocumented PATCH endpoint with a full spec entry.
#
# Patch target: paths./api/v1/auth/me
# Add sibling to existing get:

patch_auth_me:
  patch:
    tags: [Auth]
    summary: Update authenticated user profile
    description: >
      Partially update mutable fields of the authenticated user's profile.
      All fields are optional; only provided fields are updated.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateUserProfileRequest"
    responses:
      "200":
        description: Updated user profile
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfile"
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"

# --- SECTION 3: New schema UpdateUserProfileRequest ---
# Add to components/schemas:

UpdateUserProfileRequest:
  type: object
  description: Mutable fields of a user profile. All fields are optional.
  properties:
    preferred_currency:
      type: string
      description: ISO 4217 currency code. Must be one of the supported currencies.
      example: USD
      enum: [EUR, USD, GBP, CHF, SEK, NOK, DKK, PLN]
    onboarding_completed:
      type: boolean
      description: >
        Set to true to mark the onboarding tour as completed or skipped.
        Cannot be set back to false via this endpoint.
      example: true
