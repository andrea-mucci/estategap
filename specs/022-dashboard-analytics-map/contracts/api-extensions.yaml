# API Contract Extensions: Dashboard Analytics & Interactive Map
#
# This file documents the NEW and CHANGED API contracts required for feature 022.
# All changes extend services/api-gateway/openapi.yaml.
#
# Each entry includes: endpoint, change type, request/response schema delta.

openapi: "3.1.0"
info:
  title: "EstateGap API Extensions — Feature 022"
  version: "022.0.0"
  description: |
    API contract changes required by the Dashboard Analytics & Interactive Map feature.
    These extend the existing openapi.yaml in services/api-gateway/.

paths:

  # ─────────────────────────────────────────────────────────────
  # CHANGED: GET /api/v1/listings
  # Adds: bounds query param, format=geojson, lat/lng in response
  # ─────────────────────────────────────────────────────────────
  /api/v1/listings:
    get:
      summary: "Search listings (extended)"
      description: |
        Extended to support viewport-bounded GeoJSON output for the map.
        All existing params remain unchanged.
      parameters:
        # NEW params (append to existing param list):
        - name: bounds
          in: query
          required: false
          description: |
            Bounding box filter: "minLng,minLat,maxLng,maxLat" (WGS84 degrees).
            When provided, only listings whose location falls within the envelope
            are returned. Listings with null location are excluded.
          schema:
            type: string
            pattern: "^-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?$"
            example: "-3.9,40.2,-3.5,40.6"

        - name: format
          in: query
          required: false
          description: |
            Response format. Default is "json" (paginated ListingsPage).
            Use "geojson" to return a GeoJSON FeatureCollection for map rendering.
            When format=geojson, pagination cursor is omitted; use bounds to limit results.
          schema:
            type: string
            enum: [json, geojson]
            default: json

      responses:
        "200":
          description: Listings (JSON or GeoJSON depending on format param)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ListingsPage"      # format=json (default)
                  - $ref: "#/components/schemas/ListingsGeoJSON"    # format=geojson

  # ─────────────────────────────────────────────────────────────
  # NEW: GET /api/v1/dashboard/summary
  # Returns aggregated stats for dashboard summary cards
  # ─────────────────────────────────────────────────────────────
  /api/v1/dashboard/summary:
    get:
      operationId: getDashboardSummary
      summary: "Get dashboard summary stats for a country"
      description: |
        Returns four aggregate metrics used by the dashboard summary cards.
        Results are cached server-side for 60 seconds per country.
        Requires authentication. Results are scoped to countries accessible
        under the requesting user's subscription tier.
      security:
        - BearerAuth: []
      parameters:
        - name: country
          in: query
          required: true
          description: "ISO 3166-1 alpha-2 country code (e.g., ES, FR, IT)"
          schema:
            type: string
            minLength: 2
            maxLength: 2
            example: "ES"
      responses:
        "200":
          description: Dashboard summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "400":
          description: Invalid or missing country parameter
        "401":
          description: Unauthorized
        "403":
          description: Country not accessible under current subscription tier

  # ─────────────────────────────────────────────────────────────
  # NEW: GET /api/v1/zones/{id}/geometry
  # Returns GeoJSON polygon for a zone (for map overlay)
  # ─────────────────────────────────────────────────────────────
  /api/v1/zones/{id}/geometry:
    get:
      operationId: getZoneGeometry
      summary: "Get GeoJSON geometry for a zone"
      description: |
        Returns the zone boundary as a GeoJSON MultiPolygon with bounding box.
        Used by the map to render zone polygon overlays.
        Results are cached server-side for 5 minutes per zone ID.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Zone UUID"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Zone GeoJSON geometry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneGeometry"
        "404":
          description: Zone not found
        "401":
          description: Unauthorized

  # ─────────────────────────────────────────────────────────────
  # NEW: POST /api/v1/zones
  # Creates a user-defined custom zone from a drawn polygon
  # ─────────────────────────────────────────────────────────────
  /api/v1/zones:
    post:
      operationId: createCustomZone
      summary: "Create a custom zone from a drawn polygon"
      description: |
        Saves a user-drawn polygon as a custom zone in the user's account.
        Only type=custom zones can be created by regular authenticated users.
        System zone levels (0–4) are admin-only.
        Maximum 20 custom zones per user (enforced server-side).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomZoneRequest"
      responses:
        "201":
          description: Custom zone created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneDetail"
        "400":
          description: Invalid polygon geometry or missing required fields
        "401":
          description: Unauthorized
        "422":
          description: Validation error (self-intersecting polygon, name too long, etc.)
        "429":
          description: Custom zone limit reached for this account

components:
  schemas:

    # ─────────────────────────────────────────────────────────
    # CHANGED: ListingSummary (two new fields added)
    # ─────────────────────────────────────────────────────────
    ListingSummaryExtension:
      description: |
        ADDITIONS to the existing ListingSummary schema.
        New nullable coordinate fields extracted from PostGIS location column.
      properties:
        latitude:
          type: number
          format: double
          nullable: true
          description: "WGS84 latitude of the listing (null if not geocoded)"
          example: 40.4168
        longitude:
          type: number
          format: double
          nullable: true
          description: "WGS84 longitude of the listing (null if not geocoded)"
          example: -3.7038

    # ─────────────────────────────────────────────────────────
    # NEW: ListingsGeoJSON — FeatureCollection for map
    # ─────────────────────────────────────────────────────────
    ListingsGeoJSON:
      type: object
      required: [type, features]
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: "#/components/schemas/ListingGeoFeature"

    ListingGeoFeature:
      type: object
      required: [type, geometry, properties]
      properties:
        type:
          type: string
          enum: [Feature]
        geometry:
          type: object
          required: [type, coordinates]
          properties:
            type:
              type: string
              enum: [Point]
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
              description: "[longitude, latitude] in WGS84"
        properties:
          type: object
          required: [id, deal_tier]
          properties:
            id:
              type: string
              format: uuid
            deal_tier:
              type: integer
              enum: [1, 2, 3, 4]
              description: "1=Tier1 (green), 2=Tier2 (blue), 3=Tier3 (gray), 4=Tier4 (red)"
            deal_score:
              type: number
              nullable: true
            asking_price_eur:
              type: number
              nullable: true
            area_m2:
              type: number
              nullable: true
            address:
              type: string
              nullable: true
            city:
              type: string
              nullable: true
            photo_url:
              type: string
              nullable: true
            property_type:
              type: string
              nullable: true

    # ─────────────────────────────────────────────────────────
    # NEW: DashboardSummary
    # ─────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [country, total_listings, new_today, tier1_deals_today, price_drops_7d, last_refreshed_at]
      properties:
        country:
          type: string
          description: "ISO country code"
          example: "ES"
        total_listings:
          type: integer
          description: "Total active listings for the country"
          example: 12847
        new_today:
          type: integer
          description: "Listings first seen in the last 24 hours"
          example: 342
        tier1_deals_today:
          type: integer
          description: "Tier 1 deals first seen in the last 24 hours"
          example: 18
        price_drops_7d:
          type: integer
          description: "Distinct listings with a price decrease in the last 7 days"
          example: 204
        last_refreshed_at:
          type: string
          format: date-time
          description: "When these stats were last computed/cached"

    # ─────────────────────────────────────────────────────────
    # NEW: ZoneGeometry
    # ─────────────────────────────────────────────────────────
    ZoneGeometry:
      type: object
      required: [zone_id, zone_name, geometry, bbox]
      properties:
        zone_id:
          type: string
          format: uuid
        zone_name:
          type: string
          example: "Salamanca"
        geometry:
          type: object
          description: "GeoJSON MultiPolygon geometry in WGS84"
          properties:
            type:
              type: string
              enum: [MultiPolygon]
            coordinates:
              type: array
        bbox:
          type: array
          items:
            type: number
          minItems: 4
          maxItems: 4
          description: "[minLng, minLat, maxLng, maxLat]"
          example: [-3.89, 40.31, -3.52, 40.64]

    # ─────────────────────────────────────────────────────────
    # NEW: CreateCustomZoneRequest
    # ─────────────────────────────────────────────────────────
    CreateCustomZoneRequest:
      type: object
      required: [name, type, country, geometry]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: "User-assigned name for the custom zone"
          example: "My Investment Area"
        type:
          type: string
          enum: [custom]
          description: "Must be 'custom' for user-created zones"
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: "ISO country code for the zone"
          example: "ES"
        geometry:
          type: object
          description: "GeoJSON Polygon geometry. Must be a valid, non-self-intersecting closed ring."
          required: [type, coordinates]
          properties:
            type:
              type: string
              enum: [Polygon]
            coordinates:
              type: array
              description: "Array of linear rings; first and last coordinate in each ring must be identical (closed polygon)"
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
