coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    flags:
      go:
        target: 80%
        threshold: 2%
      python:
        target: 80%
        threshold: 2%
      frontend:
        target: 70%
        threshold: 2%
comment:
  layout: "diff, files"
  behavior: default
  require_changes: false
flags:
  go:
    paths:
      - libs/pkg/
      - libs/testhelpers/
      - services/api-gateway/
      - services/ws-server/
      - services/alert-engine/
      - services/alert-dispatcher/
      - services/scrape-orchestrator/
      - services/proxy-manager/
  python:
    paths:
      - libs/common/
      - services/spider-workers/
      - services/pipeline/
      - services/ml/
      - services/ai-chat/
  frontend:
    paths:
      - frontend/
