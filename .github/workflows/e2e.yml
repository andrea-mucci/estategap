name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Prepare report directories
        run: mkdir -p reports/e2e frontend/test-results

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Provision kind cluster
        run: |
          make kind-up
          make kind-build
          make kind-load
          make kind-deploy
          make kind-seed

      - name: Run Python E2E shard
        if: matrix.shard == 1
        run: |
          uv run --project tests/e2e pytest tests/e2e/api tests/e2e/websocket tests/e2e/concurrency \
            -n auto --dist=loadscope \
            --junitxml=reports/e2e/python.xml

      - name: Run Playwright shard
        working-directory: frontend
        run: |
          pnpm exec playwright test --shard=${{ matrix.shard }}/4 \
            --reporter=html,junit

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.shard }}
          path: |
            reports/e2e/
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30
