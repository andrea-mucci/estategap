name: ci-python

on:
  push:
    branches: [main, 002-monorepo-foundation]
  pull_request:
    branches: [main, 002-monorepo-foundation]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - spider-workers
          - pipeline
          - ml
          - ai-chat
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
        working-directory: services/${{ matrix.service }}
      - run: uv run ruff check .
        working-directory: services/${{ matrix.service }}
      - run: uv run mypy --strict .
        working-directory: services/${{ matrix.service }}

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - spider-workers
          - pipeline
          - ml
          - ai-chat
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
        working-directory: services/${{ matrix.service }}
      - run: uv run pytest -x
        working-directory: services/${{ matrix.service }}
