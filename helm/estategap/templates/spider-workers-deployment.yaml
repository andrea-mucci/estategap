{{- $name := "spider-workers" -}}
{{- $service := index .Values.services $name -}}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "estategap.namespace" (dict "root" . "name" $name) }}
  labels:
    {{- include "estategap.serviceLabels" (dict "root" . "name" $name) | nindent 4 }}
spec:
  replicas: {{ default 1 $service.replicaCount }}
  selector:
    matchLabels:
      {{- include "estategap.serviceSelectorLabels" (dict "root" . "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "estategap.serviceSelectorLabels" (dict "root" . "name" $name) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $service.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- include "estategap.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: {{ $name }}
          image: {{ include "estategap.serviceImage" (dict "root" . "image" $service.image) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: {{ $service.metricsPort }}
              protocol: TCP
          env:
            {{- include "estategap.kafkaEnv" . | nindent 12 }}
            {{- include "estategap.s3Env" . | nindent 12 }}
            {{- include "estategap.s3CredentialEnv" . | nindent 12 }}
            {{- range $envName, $envSpec := $service.env }}
            - name: {{ $envName }}
              {{- if hasKey $envSpec "value" }}
              value: {{ $envSpec.value | quote }}
              {{- end }}
              {{- if hasKey $envSpec "valueFrom" }}
              valueFrom:
                {{- toYaml $envSpec.valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml $service.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "estategap.namespace" (dict "root" . "name" $name) }}
  labels:
    {{- include "estategap.serviceLabels" (dict "root" . "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "estategap.serviceSelectorLabels" (dict "root" . "name" $name) | nindent 4 }}
  ports:
    - name: metrics
      port: {{ $service.metricsPort }}
      targetPort: metrics
      protocol: TCP
{{- end }}
