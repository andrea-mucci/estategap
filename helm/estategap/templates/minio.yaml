{{- if .Values.minio.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: estategap-system
  labels:
    {{- include "estategap.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  clusterIP: None
  selector:
    {{- include "estategap.serviceSelectorLabels" (dict "root" . "name" "minio") | nindent 4 }}
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: estategap-system
  labels:
    {{- include "estategap.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  selector:
    {{- include "estategap.serviceSelectorLabels" (dict "root" . "name" "minio") | nindent 4 }}
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: estategap-system
  labels:
    {{- include "estategap.serviceLabels" (dict "root" . "name" "minio") | nindent 4 }}
spec:
  serviceName: minio-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "estategap.serviceSelectorLabels" (dict "root" . "name" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "estategap.serviceSelectorLabels" (dict "root" . "name" "minio") | nindent 8 }}
    spec:
      {{- include "estategap.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: minio
          image: {{ include "estategap.serviceImage" (dict "root" . "image" .Values.minio.image) }}
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storage.size }}
{{- end }}
