{{- if .Values.loadTests.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
  namespace: {{ .Values.loadTests.namespace }}
  labels:
    {{- include "estategap.labels" . | nindent 4 }}
data:
  search.js: |
    import http from "k6/http";
    import { check } from "k6";

    export const options = {
      scenarios: {
        search_load: {
          executor: "ramping-vus",
          stages: [
            { duration: "30s", target: 1000 },
            { duration: "5m", target: 1000 },
            { duration: "30s", target: 0 },
          ],
          gracefulRampDown: "30s",
        },
      },
      thresholds: {
        http_req_duration: ["p(95)<300"],
        http_req_failed: ["rate<0.01"],
      },
    };

    const baseUrl = (__ENV.API_BASE_URL || "http://localhost:8080").replace(/\/$/, "");
    const filters = [
      "country=ES&status=active&limit=20",
      "country=FR&status=active&sort_by=deal_score&sort_dir=desc&limit=20",
      "country=IT&status=active&min_price_eur=150000&max_price_eur=500000&limit=20",
      "country=PT&status=active&min_area_m2=60&max_area_m2=180&limit=20",
    ];

    export default function () {
      const query = filters[Math.floor(Math.random() * filters.length)];
      const response = http.get(`${baseUrl}/api/v1/listings?${query}`);

      check(response, {
        "search returns 200": (res) => res.status === 200,
      });
    }
  chat.js: |
    import ws from "k6/ws";
    import { check, sleep } from "k6";

    export const options = {
      scenarios: {
        websocket_chat: {
          executor: "constant-vus",
          vus: 100,
          duration: "10m",
        },
      },
      thresholds: {
        ws_session_duration: ["p(95)<5000"],
        ws_msgs_sent: ["count>0"],
      },
    };

    const wsUrl = __ENV.WS_URL || "ws://localhost:9090/chat";

    export default function () {
      const response = ws.connect(wsUrl, {}, (socket) => {
        socket.on("open", () => {
          for (let index = 0; index < 5; index += 1) {
            socket.send(JSON.stringify({
              type: "message",
              content: `load-test message ${__VU}-${__ITER}-${index}`,
            }));
            sleep(12);
          }
          socket.close();
        });
      });

      check(response, {
        "chat upgraded to websocket": (res) => res && res.status === 101,
      });
    }
  alerts.js: |
    import http from "k6/http";
    import { check } from "k6";

    export const options = {
      scenarios: {
        alerts_burst: {
          executor: "per-vu-iterations",
          vus: 100,
          iterations: 100,
          maxDuration: "5m",
        },
      },
      thresholds: {
        http_req_duration: ["p(95)<500"],
        http_req_failed: ["rate<0.01"],
      },
    };

    const targetUrl = __ENV.ALERTS_TRIGGER_URL || "http://localhost:8080/api/v1/internal/alerts/trigger";

    export default function () {
      const response = http.post(
        targetUrl,
        JSON.stringify({
          trigger: "load-test",
          batch: __ITER,
          user_id: `00000000-0000-0000-0000-${String(__VU).padStart(12, "0")}`,
        }),
        {
          headers: {
            "Content-Type": "application/json",
          },
        },
      );

      check(response, {
        "alert trigger accepted": (res) => res.status >= 200 && res.status < 300,
      });
    }
  pipeline.js: |
    import http from "k6/http";
    import { check, fail } from "k6";

    export const options = {
      scenarios: {
        pipeline_publish: {
          executor: "per-vu-iterations",
          vus: 100,
          iterations: 500,
          maxDuration: "5m",
        },
      },
      thresholds: {
        http_req_failed: ["rate<0.01"],
      },
    };

    const publishUrl = __ENV.PIPELINE_HTTP_PUBLISH_URL;

    export default function () {
      if (!publishUrl) {
        fail("PIPELINE_HTTP_PUBLISH_URL is required for pipeline.js");
      }

      const response = http.post(
        publishUrl,
        JSON.stringify({
          topic: "estategap.raw-listings",
          key: "ES",
          message: {
            id: `${__VU}-${__ITER}`,
            country: "ES",
            price: 250000,
            source: "load-test",
          },
        }),
        {
          headers: {
            "Content-Type": "application/json",
          },
        },
      );

      check(response, {
        "pipeline publish accepted": (res) => res.status >= 200 && res.status < 300,
      });
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-tests
  namespace: {{ .Values.loadTests.namespace }}
  labels:
    {{- include "estategap.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "estategap.labels" . | nindent 8 }}
        app.kubernetes.io/component: k6-load-tests
    spec:
      restartPolicy: Never
      volumes:
        - name: k6-scripts
          configMap:
            name: k6-scripts
      containers:
        - name: k6
          image: {{ printf "%s:%s" .Values.loadTests.image.repository .Values.loadTests.image.tag }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              extra_args=""
              if [ -n "${K6_PROMETHEUS_RW_URL}" ]; then
                extra_args="--out experimental-prometheus-rw=${K6_PROMETHEUS_RW_URL}"
              fi

              k6 run ${extra_args} /scripts/search.js
              k6 run ${extra_args} /scripts/chat.js
              k6 run ${extra_args} /scripts/alerts.js
              k6 run ${extra_args} /scripts/pipeline.js
          env:
            - name: API_BASE_URL
              value: {{ .Values.loadTests.apiBaseUrl | quote }}
            - name: WS_URL
              value: {{ .Values.loadTests.wsUrl | quote }}
            - name: ALERTS_TRIGGER_URL
              value: {{ .Values.loadTests.alertsTriggerUrl | quote }}
            - name: PIPELINE_HTTP_PUBLISH_URL
              value: {{ .Values.loadTests.pipelineHttpPublishUrl | quote }}
            - name: K6_PROMETHEUS_RW_URL
              value: {{ .Values.loadTests.prometheusRemoteWriteUrl | quote }}
          volumeMounts:
            - mountPath: /scripts
              name: k6-scripts
{{- end }}
