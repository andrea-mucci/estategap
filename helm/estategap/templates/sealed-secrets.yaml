---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alert-dispatcher-secrets
  namespace: estategap-notifications
spec:
  encryptedData:
    DATABASE_URL: {{ .Values.sealedSecrets.alertDispatcherSecrets.databaseUrl | quote }}
    DATABASE_REPLICA_URL: {{ .Values.sealedSecrets.alertDispatcherSecrets.databaseReplicaUrl | quote }}
    REDIS_URL: {{ .Values.sealedSecrets.alertDispatcherSecrets.redisUrl | quote }}
    TELEGRAM_BOT_TOKEN: {{ .Values.sealedSecrets.alertDispatcherSecrets.telegramBotToken | quote }}
    TWILIO_ACCOUNT_SID: {{ .Values.sealedSecrets.alertDispatcherSecrets.twilioAccountSid | quote }}
    TWILIO_AUTH_TOKEN: {{ .Values.sealedSecrets.alertDispatcherSecrets.twilioAuthToken | quote }}
    TWILIO_WHATSAPP_FROM: {{ .Values.sealedSecrets.alertDispatcherSecrets.twilioWhatsAppFrom | quote }}
    TWILIO_WHATSAPP_TEMPLATE_SID: {{ .Values.sealedSecrets.alertDispatcherSecrets.twilioWhatsAppTemplateSid | quote }}
    FIREBASE_CREDENTIALS_JSON: {{ .Values.sealedSecrets.alertDispatcherSecrets.firebaseCredentialsJson | quote }}
    AWS_ACCESS_KEY_ID: {{ .Values.sealedSecrets.alertDispatcherSecrets.awsAccessKeyId | quote }}
    AWS_SECRET_ACCESS_KEY: {{ .Values.sealedSecrets.alertDispatcherSecrets.awsSecretAccessKey | quote }}
    AWS_SESSION_TOKEN: {{ .Values.sealedSecrets.alertDispatcherSecrets.awsSessionToken | quote }}
  template:
    metadata:
      name: alert-dispatcher-secrets
      namespace: estategap-notifications
