  namespace: estategap-intelligence
spec:
  encryptedData:
    DATABASE_URL: {{ .Values.sealedSecrets.mlScorerSecrets.databaseUrl | quote }}
  template:
    metadata:
      name: ml-scorer-secrets
      namespace: estategap-intelligence
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ai-chat-secrets
  namespace: estategap-intelligence
spec:
  encryptedData:
    DATABASE_URL: {{ .Values.sealedSecrets.aiChatSecrets.databaseUrl | quote }}
    REDIS_URL: {{ .Values.sealedSecrets.aiChatSecrets.redisUrl | quote }}
    ANTHROPIC_API_KEY: {{ .Values.sealedSecrets.aiChatSecrets.anthropicApiKey | quote }}
    OPENAI_API_KEY: {{ .Values.sealedSecrets.aiChatSecrets.openaiApiKey | quote }}
  template:
    metadata:
      name: ai-chat-secrets
      namespace: estategap-intelligence
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alert-engine-secrets
  namespace: estategap-notifications
spec:
  encryptedData:
    DATABASE_URL: {{ .Values.sealedSecrets.alertEngineSecrets.databaseUrl | quote }}
    DATABASE_REPLICA_URL: {{ .Values.sealedSecrets.alertEngineSecrets.databaseReplicaUrl | quote }}
    REDIS_URL: {{ .Values.sealedSecrets.alertEngineSecrets.redisUrl | quote }}
