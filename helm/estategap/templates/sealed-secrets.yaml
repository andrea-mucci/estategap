{{/*
Generate and replace the placeholder encrypted values below with real `kubeseal` output:

kubeseal --fetch-cert --controller-namespace kube-system > pub-cert.pem

kubectl create secret generic estategap-app-secrets \
  --namespace estategap-system \
  --from-literal=POSTGRES_PASSWORD='<strong-password>' \
  --from-literal=POSTGRES_REPLICATION_PASSWORD='<strong-password>' \
  --from-literal=REDIS_PASSWORD='<strong-password>' \
  --from-literal=STRIPE_SECRET_KEY='sk_...' \
  --from-literal=STRIPE_WEBHOOK_SECRET='whsec_...' \
  --from-literal=LLM_API_KEY_ANTHROPIC='sk-ant-...' \
  --from-literal=LLM_API_KEY_OPENAI='sk-...' \
  --from-literal=JWT_SECRET='<random-256-bit-hex>' \
  --dry-run=client -o yaml | kubeseal --cert pub-cert.pem --format yaml

kubectl create secret generic estategap-s3-credentials \
  --namespace estategap-system \
  --from-literal=AWS_ACCESS_KEY_ID='<hetzner-access-key>' \
  --from-literal=AWS_SECRET_ACCESS_KEY='<hetzner-secret-key>' \
  --from-literal=ACCESS_KEY_ID='<hetzner-access-key>' \
  --from-literal=ACCESS_SECRET_KEY='<hetzner-secret-key>' \
  --dry-run=client -o yaml | kubeseal --cert pub-cert.pem --format yaml

kubectl create secret generic ml-trainer-secrets \
  --namespace estategap-system \
  --from-literal=DATABASE_URL='postgresql://app:<password>@postgresql.databases.svc.cluster.local:5432/estategap?sslmode=require' \
  --from-literal=MLFLOW_TRACKING_URI='http://mlflow.estategap-intelligence.svc.cluster.local:5000' \
  --dry-run=client -o yaml | kubeseal --cert pub-cert.pem --format yaml

kubectl create secret generic ml-scorer-secrets \
  --namespace estategap-intelligence \
  --from-literal=DATABASE_URL='postgresql://app:<password>@postgresql.databases.svc.cluster.local:5432/estategap?sslmode=require' \
  --dry-run=client -o yaml | kubeseal --cert pub-cert.pem --format yaml

kubectl create secret generic production-hardening-secrets \
  --namespace estategap-system \
  --from-literal=DB_PASSWORD='<database-password>' \
  --from-literal=REDIS_PASSWORD='<redis-password>' \
  --from-literal=JWT_SECRET='<random-256-bit-hex>' \
  --from-literal=STRIPE_SECRET_KEY='sk_...' \
  --from-literal=STRIPE_WEBHOOK_SECRET='whsec_...' \
  --from-literal=LLM_API_KEY='sk_...' \
  --from-literal=PROXY_CREDENTIALS='user:password' \
  --from-literal=SES_CREDENTIALS='access-key-id:secret-access-key' \
  --dry-run=client -o yaml | kubeseal --cert pub-cert.pem --format yaml
*/}}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: production-hardening-secrets
  namespace: estategap-system
spec:
  encryptedData:
    DB_PASSWORD: {{ .Values.sealedSecrets.productionHardeningSecrets.dbPassword | quote }}
    REDIS_PASSWORD: {{ .Values.sealedSecrets.productionHardeningSecrets.redisPassword | quote }}
    JWT_SECRET: {{ .Values.sealedSecrets.productionHardeningSecrets.jwtSecret | quote }}
    STRIPE_SECRET_KEY: {{ .Values.sealedSecrets.productionHardeningSecrets.stripeSecretKey | quote }}
    STRIPE_WEBHOOK_SECRET: {{ .Values.sealedSecrets.productionHardeningSecrets.stripeWebhookSecret | quote }}
    LLM_API_KEY: {{ .Values.sealedSecrets.productionHardeningSecrets.llmApiKey | quote }}
    PROXY_CREDENTIALS: {{ .Values.sealedSecrets.productionHardeningSecrets.proxyCredentials | quote }}
    SES_CREDENTIALS: {{ .Values.sealedSecrets.productionHardeningSecrets.sesCredentials | quote }}
  template:
    metadata:
      name: production-hardening-secrets
      namespace: estategap-system
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: estategap-app-secrets
  namespace: estategap-system
spec:
  encryptedData:
    POSTGRES_PASSWORD: {{ .Values.sealedSecrets.appSecrets.postgresPassword | quote }}
    POSTGRES_REPLICATION_PASSWORD: {{ .Values.sealedSecrets.appSecrets.postgresReplicationPassword | quote }}
    REDIS_PASSWORD: {{ .Values.sealedSecrets.appSecrets.redisPassword | quote }}
    IDEALISTA_API_TOKEN: {{ .Values.sealedSecrets.appSecrets.idealistaApiToken | quote }}
    STRIPE_SECRET_KEY: {{ .Values.sealedSecrets.appSecrets.stripeSecretKey | quote }}
    STRIPE_WEBHOOK_SECRET: {{ .Values.sealedSecrets.appSecrets.stripeWebhookSecret | quote }}
    LLM_API_KEY_ANTHROPIC: {{ .Values.sealedSecrets.appSecrets.llmApiKeyAnthropic | quote }}
    LLM_API_KEY_OPENAI: {{ .Values.sealedSecrets.appSecrets.llmApiKeyOpenai | quote }}
    JWT_SECRET: {{ .Values.sealedSecrets.appSecrets.jwtSecret | quote }}
    username: {{ .Values.sealedSecrets.appSecrets.username | quote }}
    password: {{ .Values.sealedSecrets.appSecrets.password | quote }}
    dbname: {{ .Values.sealedSecrets.appSecrets.dbname | quote }}
  template:
    metadata:
      name: estategap-app-secrets
      namespace: estategap-system
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-gateway-secrets
  namespace: estategap-gateway
spec:
  encryptedData:
    DB_PRIMARY_URL: {{ .Values.sealedSecrets.apiGatewaySecrets.dbPrimaryUrl | quote }}
    DB_REPLICA_URL: {{ .Values.sealedSecrets.apiGatewaySecrets.dbReplicaUrl | quote }}
    REDIS_URL: {{ .Values.sealedSecrets.apiGatewaySecrets.redisUrl | quote }}
    JWT_SECRET: {{ .Values.sealedSecrets.apiGatewaySecrets.jwtSecret | quote }}
    GOOGLE_CLIENT_ID: {{ .Values.sealedSecrets.apiGatewaySecrets.googleClientId | quote }}
    GOOGLE_CLIENT_SECRET: {{ .Values.sealedSecrets.apiGatewaySecrets.googleClientSecret | quote }}
    GOOGLE_REDIRECT_URL: {{ .Values.sealedSecrets.apiGatewaySecrets.googleRedirectUrl | quote }}
    STRIPE_SECRET_KEY: {{ .Values.sealedSecrets.apiGatewaySecrets.stripeSecretKey | quote }}
    STRIPE_WEBHOOK_SECRET: {{ .Values.sealedSecrets.apiGatewaySecrets.stripeWebhookSecret | quote }}
  template:
    metadata:
      name: api-gateway-secrets
      namespace: estategap-gateway
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: redis-credentials
  namespace: estategap-system
spec:
  encryptedData:
    redis-password: {{ .Values.sealedSecrets.redisCredentials.redisPassword | quote }}
  template:
    metadata:
      name: redis-credentials
      namespace: estategap-system
---
{{- range $namespace := list "estategap-system" "estategap-gateway" "estategap-intelligence" "estategap-scraping" "estategap-notifications" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: estategap-s3-credentials
  namespace: {{ $namespace }}
spec:
  encryptedData:
    AWS_ACCESS_KEY_ID: {{ $.Values.sealedSecrets.s3Credentials.accessKeyId | quote }}
    AWS_SECRET_ACCESS_KEY: {{ $.Values.sealedSecrets.s3Credentials.secretAccessKey | quote }}
    ACCESS_KEY_ID: {{ $.Values.sealedSecrets.s3Credentials.accessKeyId | quote }}
    ACCESS_SECRET_KEY: {{ $.Values.sealedSecrets.s3Credentials.secretAccessKey | quote }}
  template:
    metadata:
      name: estategap-s3-credentials
      namespace: {{ $namespace }}
---
{{- end }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-credentials
  namespace: monitoring
spec:
  encryptedData:
    admin-user: {{ .Values.sealedSecrets.grafanaCredentials.adminUser | quote }}
    admin-password: {{ .Values.sealedSecrets.grafanaCredentials.adminPassword | quote }}
  template:
    metadata:
      name: grafana-credentials
      namespace: monitoring
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ml-trainer-secrets
  namespace: estategap-system
spec:
  encryptedData:
    DATABASE_URL: {{ .Values.sealedSecrets.mlTrainerSecrets.databaseUrl | quote }}
    MLFLOW_TRACKING_URI: {{ .Values.sealedSecrets.mlTrainerSecrets.mlflowTrackingUri | quote }}
  template:
    metadata:
      name: ml-trainer-secrets
      namespace: estategap-system
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
