{{- if .Values.grafana.dashboards.enabled }}
{{- $root := . }}
{{- range $name := list "scraping-health" "pipeline-throughput" "ml-metrics" "alert-latency" "api-performance" "websocket-connections" "kafka-consumer-lag" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: estategap-dashboard-{{ $name }}
  namespace: {{ $root.Values.grafana.dashboards.namespace }}
  labels:
    {{- include "estategap.labels" $root | nindent 4 }}
    {{- toYaml $root.Values.grafana.dashboards.labels | nindent 4 }}
data:
  {{ $name }}.json: |
{{ $root.Files.Get (printf "dashboards/%s.json" $name) | indent 4 }}
{{- end }}
{{- end }}
