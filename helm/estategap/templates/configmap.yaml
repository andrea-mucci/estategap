apiVersion: v1
kind: ConfigMap
metadata:
  name: estategap-config
  namespace: estategap-system
  labels:
    {{- include "estategap.labels" . | nindent 4 }}
data:
  DATABASE_HOST: {{ .Values.postgresql.external.host | quote }}
  DATABASE_PORT: {{ printf "%v" .Values.postgresql.external.port | quote }}
  DATABASE_NAME: {{ .Values.postgresql.external.database | quote }}
  DATABASE_SSLMODE: {{ .Values.postgresql.external.sslmode | quote }}
  {{- if .Values.postgresql.readReplica.enabled }}
  DATABASE_RO_HOST: {{ .Values.postgresql.readReplica.host | quote }}
  DATABASE_RO_PORT: {{ printf "%v" .Values.postgresql.readReplica.port | quote }}
  {{- end }}
  REDIS_HOST: redis.estategap-system.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_SENTINEL_HOST: redis.estategap-system.svc.cluster.local
  REDIS_SENTINEL_PORT: "26379"
  S3_ENDPOINT: {{ .Values.s3.endpoint | quote }}
  S3_REGION: {{ .Values.s3.region | quote }}
  S3_BUCKET_PREFIX: {{ .Values.s3.bucketPrefix | quote }}
  PROMETHEUS_PUSHGATEWAY_URL: {{ .Values.mlTrainer.prometheusPushgatewayUrl | quote }}
  STRIPE_SUCCESS_URL: {{ .Values.stripe.successUrl | quote }}
  STRIPE_CANCEL_URL: {{ .Values.stripe.cancelUrl | quote }}
  STRIPE_PORTAL_RETURN_URL: {{ .Values.stripe.portalReturnUrl | quote }}
  STRIPE_PRICE_BASIC_MONTHLY: {{ .Values.stripe.priceBasicMonthly | quote }}
  STRIPE_PRICE_BASIC_ANNUAL: {{ .Values.stripe.priceBasicAnnual | quote }}
  STRIPE_PRICE_PRO_MONTHLY: {{ .Values.stripe.priceProMonthly | quote }}
  STRIPE_PRICE_PRO_ANNUAL: {{ .Values.stripe.priceProAnnual | quote }}
  STRIPE_PRICE_GLOBAL_MONTHLY: {{ .Values.stripe.priceGlobalMonthly | quote }}
  STRIPE_PRICE_GLOBAL_ANNUAL: {{ .Values.stripe.priceGlobalAnnual | quote }}
  STRIPE_PRICE_API_MONTHLY: {{ .Values.stripe.priceApiMonthly | quote }}
  STRIPE_PRICE_API_ANNUAL: {{ .Values.stripe.priceApiAnnual | quote }}
  {{- if and .Values.testMode .Values.testMode.enabled }}
  ESTATEGAP_TEST_MODE: "true"
  NOW_OVERRIDE: {{ .Values.testMode.nowOverride | quote }}
  FAKE_LLM_PROVIDER: "true"
  TEST_SCHEDULE_OVERRIDE: {{ .Values.testMode.scheduleOverride | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.testMode.stripeWebhookSecret | quote }}
  FIXTURE_S3_BUCKET: {{ .Values.testMode.fixtureS3Bucket | quote }}
  {{- end }}
