{{- if .Values.postgresql.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: estategap-postgres
  namespace: estategap-system
  labels:
    {{- include "estategap.labels" . | nindent 4 }}
spec:
  imageName: {{ .Values.postgresql.imageName | quote }}
  instances: {{ .Values.postgresql.instances }}
  primaryUpdateStrategy: unsupervised
  storage:
    size: {{ .Values.postgresql.storage.size }}
    {{- if .Values.global.storageClass }}
    storageClass: {{ .Values.global.storageClass | quote }}
    {{- end }}
  resources:
    {{- toYaml .Values.postgresql.resources | nindent 4 }}
  superuserSecret:
    name: estategap-app-secrets
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
  bootstrap:
    initdb:
      database: {{ .Values.postgresql.database | quote }}
      owner: {{ .Values.postgresql.owner | quote }}
      secret:
        name: estategap-app-secrets
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis
        - CREATE EXTENSION IF NOT EXISTS postgis_topology
  backup:
    retentionPolicy: {{ .Values.postgresql.backup.retentionPolicy | quote }}
    barmanObjectStore:
      destinationPath: {{ .Values.postgresql.backup.destinationPath | quote }}
      endpointURL: {{ .Values.s3.endpoint | quote }}
      s3Credentials:
        accessKeyId:
          name: estategap-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: estategap-s3-credentials
          key: ACCESS_SECRET_KEY
{{- end }}
