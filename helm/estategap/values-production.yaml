cluster:
  environment: production
  certIssuer: letsencrypt-prod

components:
  redis:
    deploy: true
  mlflow:
    deploy: true
  kafka:
    deploy: false
  postgresql:
    deploy: false
  prometheus:
    deploy: false
  grafana:
    deploy: false

kafka:
  brokers: kafka-bootstrap.kafka.svc.cluster.local:9092
  topicInit:
    replicationFactor: 3

postgresql:
  external:
    host: postgresql.databases.svc.cluster.local

argocd:
  # Required: set this to the canonical repository URL for ArgoCD sync.
  repoURL: https://github.com/andrea-mucci/estategap.git

services:
  api-gateway:
    image:
      tag: 0.1.0
    hpa:
      minReplicas: 3
      maxReplicas: 50
  websocket-server:
    image:
      tag: 0.1.0
  alert-engine:
    image:
      tag: 0.1.0
  alert-dispatcher:
    image:
      tag: 0.1.0
  scrape-orchestrator:
    image:
      tag: 0.1.0
  proxy-manager:
    image:
      tag: 0.1.0
  spider-workers:
    image:
      tag: 0.1.0
  pipeline:
    image:
      tag: 0.1.0
  ml-scorer:
    image:
      tag: 0.1.0
  ai-chat:
    image:
      tag: 0.1.0
  frontend:
    image:
      tag: 0.1.0
