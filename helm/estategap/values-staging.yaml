cluster:
  environment: staging
  certIssuer: letsencrypt-staging

nats:
  replicas: 1
  storage:
    size: 2Gi
  config:
    cluster:
      replicas: 1
    jetstream:
      fileStore:
        pvc:
          size: 2Gi

postgresql:
  instances: 1
  storage:
    size: 20Gi

minio:
  storage:
    size: 10Gi

observability:
  prometheus:
    retention: 3d
    storage:
      size: 10Gi

prometheus:
  prometheus:
    prometheusSpec:
      retention: 3d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 10Gi

argocd:
  # Required: set this to the canonical repository URL for ArgoCD sync.
  repoURL: https://github.com/andrea-mucci/estategap.git

mlScorer:
  batchFlushSeconds: 3
  modelPollIntervalSeconds: 30

services:
  ml-scorer:
    hpa:
      minReplicas: 1
      maxReplicas: 2
  alert-engine:
    replicaCount: 1
    env:
      RULE_CACHE_REFRESH_INTERVAL:
        value: 60s
      WORKER_POOL_SIZE:
        value: "0"
      BATCH_SIZE:
        value: "100"
      HEALTH_PORT:
        value: "8080"
      LOG_LEVEL:
        value: INFO
