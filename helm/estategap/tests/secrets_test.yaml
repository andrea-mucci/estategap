suite: sealed-secrets
templates:
  - templates/sealed-secrets.yaml
tests:
  - it: renders SealedSecret resources rather than raw Secrets
    asserts:
      - equal:
          documentIndex: 1
          path: kind
          value: SealedSecret

  - it: includes encrypted data keys for the application secret bundle
    asserts:
      - exists:
          documentIndex: 1
          path: spec.encryptedData.POSTGRES_PASSWORD
      - exists:
          documentIndex: 1
          path: spec.encryptedData.STRIPE_SECRET_KEY

  - it: does not render empty encrypted values for the application secret bundle
    asserts:
      - notEqual:
          documentIndex: 1
          path: spec.encryptedData.POSTGRES_PASSWORD
          value: ""
      - notEqual:
          documentIndex: 1
          path: spec.encryptedData.STRIPE_SECRET_KEY
          value: ""
