suite: kafka
templates:
  - templates/kafka-configmap.yaml
  - templates/kafka-topics-init-job.yaml
  - templates/keda-scaledobject.yaml
tests:
  - it: renders the shared Kafka config map
    asserts:
      - equal:
          path: metadata.name
          value: estategap-kafka-config
      - equal:
          path: data.KAFKA_TOPIC_PREFIX
          value: estategap.

  - it: renders the Kafka topic init hook job
    template: templates/kafka-topics-init-job.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: spec.backoffLimit
          value: 5

  - it: reads SASL credentials from the configured secret
    template: templates/kafka-topics-init-job.yaml
    set:
      kafka.sasl.enabled: true
      kafka.sasl.mechanism: SCRAM-SHA-512
      kafka.sasl.credentialsSecret: kafka-sasl-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[4].value
          value: SCRAM-SHA-512
      - equal:
          path: spec.template.spec.containers[0].env[5].valueFrom.secretKeyRef.name
          value: kafka-sasl-secret
      - equal:
          path: spec.template.spec.containers[0].env[5].valueFrom.secretKeyRef.key
          value: KAFKA_SASL_USERNAME
      - equal:
          path: spec.template.spec.containers[0].env[6].valueFrom.secretKeyRef.name
          value: kafka-sasl-secret
      - equal:
          path: spec.template.spec.containers[0].env[6].valueFrom.secretKeyRef.key
          value: KAFKA_SASL_PASSWORD

  - it: uses the Kafka scaler for spider-workers
    template: templates/keda-scaledobject.yaml
    asserts:
      - equal:
          path: spec.triggers[0].type
          value: kafka
      - equal:
          path: spec.triggers[0].metadata.topic
          value: estategap.scraper-commands
