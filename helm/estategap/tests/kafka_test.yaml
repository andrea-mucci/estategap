suite: kafka
templates:
  - templates/kafka-configmap.yaml
  - templates/kafka-topics-init-job.yaml
  - templates/keda-scaledobject.yaml
tests:
  - it: renders the shared Kafka config map
    asserts:
      - equal:
          path: metadata.name
          value: estategap-kafka-config
      - equal:
          path: data.KAFKA_TOPIC_PREFIX
          value: estategap.

  - it: renders the Kafka topic init hook job
    template: templates/kafka-topics-init-job.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: spec.backoffLimit
          value: 5

  - it: uses the Kafka scaler for spider-workers
    template: templates/keda-scaledobject.yaml
    asserts:
      - equal:
          path: spec.triggers[0].type
          value: kafka
      - equal:
          path: spec.triggers[0].metadata.topic
          value: estategap.scraper-commands
