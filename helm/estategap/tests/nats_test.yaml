suite: nats
templates:
  - templates/nats-streams-job.yaml
tests:
  - it: caps stream replication to the configured single-node test profile
    values:
      - values-test.yaml
    asserts:
      - matchRegex:
          documentIndex: 3
          path: data.raw-listings.yaml
          pattern: "(?m)^replicas: 1$"

  - it: points the setup job at the chart-configured NATS client port
    values:
      - values-test.yaml
    asserts:
      - equal:
          documentIndex: 5
          path: spec.template.spec.containers[0].env[0].value
          value: nats://nats.estategap-system.svc.cluster.local:4222

  - it: omits the NATS setup hook when NATS is disabled
    set:
      nats.enabled: false
    asserts:
      - hasDocuments:
          count: 0
