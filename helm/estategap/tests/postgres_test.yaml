suite: postgresql
templates:
  - templates/configmap.yaml
tests:
  - it: renders the external PostgreSQL host in the shared config map
    set:
      postgresql.external.host: postgresql.example.internal
    asserts:
      - equal:
          path: data.DATABASE_HOST
          value: postgresql.example.internal

  - it: renders the external PostgreSQL port in the shared config map
    set:
      postgresql.external.port: 6432
    asserts:
      - equal:
          path: data.DATABASE_PORT
          value: "6432"
