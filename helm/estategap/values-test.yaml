cluster:
  environment: test
  domain: localhost
  certIssuer: ""

global:
  testMode: true
  imageRegistry: localhost:5001
  imagePullSecrets: []

argocd:
  enabled: false

components:
  redis:
    deploy: true
  mlflow:
    deploy: true
  kafka:
    deploy: false
  postgresql:
    deploy: false
  prometheus:
    deploy: false
  grafana:
    deploy: false

prometheus:
  serviceMonitor:
    enabled: false
  rules:
    enabled: false

grafana:
  dashboards:
    enabled: false

keda:
  enabled: false

kafka:
  brokers: kafka-bootstrap.kafka.svc.cluster.local:9092
  topicPrefix: estategap.
  topicInit:
    replicationFactor: 1

postgresql:
  external:
    host: postgresql.databases.svc.cluster.local

redis:
  architecture: standalone
  auth:
    enabled: false
  sentinel:
    enabled: false

s3:
  endpoint: http://localstack:4566
  region: us-east-1
  bucketPrefix: test
  forcePathStyle: true

mlTrainer:
  image:
    repository: ml
    tag: dev
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

services:
  api-gateway:
    replicaCount: 1
    image:
      repository: api-gateway
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  websocket-server:
    replicaCount: 1
    image:
      repository: ws-server
      tag: dev
    env:
      PING_INTERVAL:
        value: "10s"
      PONG_TIMEOUT:
        value: "10s"
      IDLE_TIMEOUT:
        value: "30s"
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  alert-engine:
    replicaCount: 1
    image:
      repository: alert-engine
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  alert-dispatcher:
    replicaCount: 1
    image:
      repository: alert-dispatcher
      tag: dev
    serviceMonitor:
      enabled: false
  scrape-orchestrator:
    replicaCount: 1
    image:
      repository: scrape-orchestrator
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  proxy-manager:
    replicaCount: 1
    image:
      repository: proxy-manager
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  spider-workers:
    replicaCount: 1
    image:
      repository: spider-workers
      tag: dev
    hpa:
      enabled: false
    keda:
      enabled: false
    serviceMonitor:
      enabled: false
  pipeline:
    replicaCount: 1
    image:
      repository: pipeline
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  pipeline-enricher:
    replicaCount: 1
    image:
      repository: pipeline
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  pipeline-change-detector:
    replicaCount: 1
    image:
      repository: pipeline
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  ml-scorer:
    replicaCount: 1
    image:
      repository: ml
      tag: dev
    hpa:
      enabled: false
  ai-chat:
    replicaCount: 1
    image:
      repository: ai-chat
      tag: dev
    hpa:
      enabled: false
    serviceMonitor:
      enabled: false
  frontend:
    replicaCount: 1
    image:
      repository: frontend
      tag: dev

testMode:
  enabled: true
  nowOverride: ""
  stripeWebhookSecret: whsec_test_fake
  fixtureS3Bucket: fixtures
  fakeLLMProvider: true
  scheduleOverride: "*/30 * * * * *"
