global:
  storageClass: ""
  imageRegistry: ""
  imagePullSecrets: []

cluster:
  environment: staging
  domain: estategap.com
  certIssuer: letsencrypt-staging

components:
  redis:
    deploy: true
  mlflow:
    deploy: true
  kafka:
    deploy: false
  postgresql:
    deploy: false
  prometheus:
    deploy: false
  grafana:
    deploy: false

kafka:
  brokers: kafka-bootstrap.kafka.svc.cluster.local:9092
  topicPrefix: estategap.
  tls:
    enabled: false
    caSecret: ""
  sasl:
    enabled: false
    mechanism: PLAIN
    credentialsSecret: ""
  consumer:
    maxRetries: 3
  topicInit:
    enabled: true
    replicationFactor: 3
    image:
      repository: bitnami/kafka
      tag: "3.7"
  deadLetter:
    enabled: true
    retentionDays: 30

postgresql:
  external:
    host: postgresql.databases.svc.cluster.local
    port: 5432
    database: estategap
    sslmode: require
    credentialsSecret: estategap-db-credentials
  readReplica:
    enabled: false
    host: postgresql-read.databases.svc.cluster.local
    port: 5432
  migrations:
    enabled: true
    image: ghcr.io/andrea-mucci/estategap/pipeline:latest
    timeout: 300

redis:
  fullnameOverride: redis
  architecture: replication
  auth:
    enabled: true
    existingSecret: redis-credentials
    existingSecretPasswordKey: redis-password
  sentinel:
    enabled: true
    quorum: 2
    service:
      ports:
        redis: 6379
        sentinel: 26379
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  replica:
    replicaCount: 1
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  commonConfiguration: |
    maxmemory 1gb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

s3:
  endpoint: https://fsn1.your-objectstorage.com
  region: fsn1
  bucketPrefix: estategap
  forcePathStyle: true
  credentialsSecret: estategap-s3-credentials
  buckets:
    mlModels: ml-models
    trainingData: training-data
    listingPhotos: listing-photos
    exports: exports
    backups: backups

prometheus:
  serviceMonitor:
    enabled: true
    interval: 15s
    labels:
      release: prometheus
  rules:
    enabled: true
    labels:
      release: prometheus

grafana:
  dashboards:
    enabled: true
    namespace: monitoring
    labels:
      grafana_dashboard: "1"

keda:
  enabled: true

argocd:
  enabled: true
  applicationName: estategap-staging
  repoURL: ""
  targetRevision: main
  valueFiles:
    - values-staging.yaml
  syncPolicy:
    prune: false
    selfHeal: true

sealedSecrets:
  appSecrets:
    postgresPassword: AgReplaceWithKubesealOutput
    postgresReplicationPassword: AgReplaceWithKubesealOutput
    redisPassword: AgReplaceWithKubesealOutput
    idealistaApiToken: AgReplaceWithKubesealOutput
    stripeSecretKey: AgReplaceWithKubesealOutput
    stripeWebhookSecret: AgReplaceWithKubesealOutput
    llmApiKeyAnthropic: AgReplaceWithKubesealOutput
    llmApiKeyOpenai: AgReplaceWithKubesealOutput
    jwtSecret: AgReplaceWithKubesealOutput
    username: AgReplaceWithKubesealOutput
    password: AgReplaceWithKubesealOutput
    dbname: AgReplaceWithKubesealOutput
  apiGatewaySecrets:
    dbPrimaryUrl: AgReplaceWithKubesealOutput
    dbReplicaUrl: AgReplaceWithKubesealOutput
    redisUrl: AgReplaceWithKubesealOutput
    jwtSecret: AgReplaceWithKubesealOutput
    googleClientId: AgReplaceWithKubesealOutput
    googleClientSecret: AgReplaceWithKubesealOutput
    googleRedirectUrl: AgReplaceWithKubesealOutput
    stripeSecretKey: AgReplaceWithKubesealOutput
    stripeWebhookSecret: AgReplaceWithKubesealOutput
  productionHardeningSecrets:
    dbPassword: AgReplaceWithKubesealOutput
    redisPassword: AgReplaceWithKubesealOutput
    jwtSecret: AgReplaceWithKubesealOutput
    stripeSecretKey: AgReplaceWithKubesealOutput
    stripeWebhookSecret: AgReplaceWithKubesealOutput
    llmApiKey: AgReplaceWithKubesealOutput
    proxyCredentials: AgReplaceWithKubesealOutput
    sesCredentials: AgReplaceWithKubesealOutput
  redisCredentials:
    redisPassword: AgReplaceWithKubesealOutput
  s3Credentials:
    accessKeyId: AgReplaceWithKubesealOutput
    secretAccessKey: AgReplaceWithKubesealOutput
  grafanaCredentials:
    adminUser: AgReplaceWithKubesealOutput
    adminPassword: AgReplaceWithKubesealOutput
  mlTrainerSecrets:
    databaseUrl: AgReplaceWithKubesealOutput
    mlflowTrackingUri: AgReplaceWithKubesealOutput
  mlScorerSecrets:
    databaseUrl: AgReplaceWithKubesealOutput
  aiChatSecrets:
    databaseUrl: AgReplaceWithKubesealOutput
    redisUrl: AgReplaceWithKubesealOutput
    anthropicApiKey: AgReplaceWithKubesealOutput
    openaiApiKey: AgReplaceWithKubesealOutput
  alertEngineSecrets:
    databaseUrl: AgReplaceWithKubesealOutput
    databaseReplicaUrl: AgReplaceWithKubesealOutput
    redisUrl: AgReplaceWithKubesealOutput
  alertDispatcherSecrets:
    databaseUrl: AgReplaceWithKubesealOutput
    databaseReplicaUrl: AgReplaceWithKubesealOutput
    redisUrl: AgReplaceWithKubesealOutput
    telegramBotToken: AgReplaceWithKubesealOutput
    twilioAccountSid: AgReplaceWithKubesealOutput
    twilioAuthToken: AgReplaceWithKubesealOutput
    twilioWhatsAppFrom: AgReplaceWithKubesealOutput
    twilioWhatsAppTemplateSid: AgReplaceWithKubesealOutput
    firebaseCredentialsJson: AgReplaceWithKubesealOutput
    awsAccessKeyId: AgReplaceWithKubesealOutput
    awsSecretAccessKey: AgReplaceWithKubesealOutput
    awsSessionToken: AgReplaceWithKubesealOutput

stripe:
  successUrl: https://app.estategap.com/dashboard?checkout=success
  cancelUrl: https://app.estategap.com/pricing?checkout=cancelled
  portalReturnUrl: https://app.estategap.com/dashboard
  priceBasicMonthly: price_replace_basic_monthly
  priceBasicAnnual: price_replace_basic_annual
  priceProMonthly: price_replace_pro_monthly
  priceProAnnual: price_replace_pro_annual
  priceGlobalMonthly: price_replace_global_monthly
  priceGlobalAnnual: price_replace_global_annual
  priceApiMonthly: price_replace_api_monthly
  priceApiAnnual: price_replace_api_annual

mlTrainer:
  image:
    repository: ghcr.io/andrea-mucci/estategap/ml-trainer
    tag: latest
  schedule: "0 3 * * 0"
  prometheusPushgatewayUrl: ""
  resources:
    requests:
      memory: 4Gi
      cpu: "2"
    limits:
      memory: 8Gi
      cpu: "4"

mlScorer:
  grpcPort: 50051
  prometheusPort: 9091
  batchSize: 50
  batchFlushSeconds: 5
  modelPollIntervalSeconds: 60
  comparablesRefreshIntervalSeconds: 3600
  shapTimeoutSeconds: 2.0

gdpr:
  hardDeleteCron:
    enabled: true
    schedule: "0 2 * * *"
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    database:
      host: postgresql.databases.svc.cluster.local
      port: "5432"
      userSecretRef:
        name: estategap-app-secrets
        key: username
      passwordSecretRef:
        name: estategap-app-secrets
        key: POSTGRES_PASSWORD
      databaseSecretRef:
        name: estategap-app-secrets
        key: dbname
    redis:
      host: redis.estategap-system.svc.cluster.local
      port: "6379"
      passwordSecretRef:
        name: redis-credentials
        key: redis-password

loadTests:
  enabled: false
  namespace: estategap-system
  image:
    repository: grafana/k6
    tag: latest
  apiBaseUrl: https://staging.estategap.com
  wsUrl: wss://staging.estategap.com/chat
  alertsTriggerUrl: https://staging.estategap.com/api/v1/internal/alerts/trigger
  pipelineHttpPublishUrl: ""
  prometheusRemoteWriteUrl: ""

services:
  api-gateway:
    enabled: true
    namespace: estategap-gateway
    replicaCount: 2
    port: 8080
    image:
      repository: ghcr.io/andrea-mucci/estategap/api-gateway
      tag: latest
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    env:
      PORT:
        value: "8080"
      LOG_LEVEL:
        value: INFO
      ALLOWED_ORIGINS:
        value: https://app.estategap.com
      CSP_REPORT_ONLY:
        value: "true"
      CSP_REPORT_URI:
        value: ""
      DB_PRIMARY_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: DB_PRIMARY_URL
      DB_REPLICA_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: DB_REPLICA_URL
      REDIS_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: REDIS_URL
      JWT_SECRET:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: JWT_SECRET
      GOOGLE_CLIENT_ID:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: GOOGLE_CLIENT_SECRET
      GOOGLE_REDIRECT_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: GOOGLE_REDIRECT_URL
      STRIPE_SECRET_KEY:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: STRIPE_SECRET_KEY
      STRIPE_WEBHOOK_SECRET:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: STRIPE_WEBHOOK_SECRET
      STRIPE_SUCCESS_URL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_SUCCESS_URL
      STRIPE_CANCEL_URL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_CANCEL_URL
      STRIPE_PORTAL_RETURN_URL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PORTAL_RETURN_URL
      STRIPE_PRICE_BASIC_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_BASIC_MONTHLY
      STRIPE_PRICE_BASIC_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_BASIC_ANNUAL
      STRIPE_PRICE_PRO_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_PRO_MONTHLY
      STRIPE_PRICE_PRO_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_PRO_ANNUAL
      STRIPE_PRICE_GLOBAL_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_GLOBAL_MONTHLY
      STRIPE_PRICE_GLOBAL_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_GLOBAL_ANNUAL
      STRIPE_PRICE_API_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_API_MONTHLY
      STRIPE_PRICE_API_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_API_ANNUAL
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /readyz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 20
      cpuTarget: 60

  websocket-server:
    enabled: true
    namespace: estategap-gateway
    port: 8081
    image:
      repository: ghcr.io/andrea-mucci/estategap/websocket-server
      tag: latest
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  alert-engine:
    enabled: true
    namespace: estategap-notifications
    replicaCount: 1
    port: 8080
    image:
      repository: ghcr.io/andrea-mucci/estategap/alert-engine
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      DATABASE_URL:
        valueFrom:
          secretKeyRef:
            name: alert-engine-secrets
            key: DATABASE_URL
      DATABASE_REPLICA_URL:
        valueFrom:
          secretKeyRef:
            name: alert-engine-secrets
            key: DATABASE_REPLICA_URL
      REDIS_URL:
        valueFrom:
          secretKeyRef:
            name: alert-engine-secrets
            key: REDIS_URL
      RULE_CACHE_REFRESH_INTERVAL:
        value: 60s
      WORKER_POOL_SIZE:
        value: "0"
      BATCH_SIZE:
        value: "100"
      HEALTH_PORT:
        value: "8080"
      LOG_LEVEL:
        value: INFO
    livenessProbe:
      httpGet:
        path: /health/live
        port: http
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /health/ready
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s

  alert-dispatcher:
    enabled: true
    namespace: estategap-notifications
    replicaCount: 1
    port: 8081
    image:
      repository: ghcr.io/andrea-mucci/estategap/alert-dispatcher
      tag: latest
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    config:
      logLevel: INFO
      healthPort: 8081
      baseUrl: https://api.estategap.com
      workerPoolSize: 16
      batchSize: 50
      awsRegion: eu-west-1
      awsSesFromAddress: alerts@estategap.com
      awsSesFromName: EstateGap Alerts
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /readyz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s

  scrape-orchestrator:
    enabled: true
    namespace: estategap-scraping
    port: 8082
    image:
      repository: ghcr.io/andrea-mucci/estategap/scrape-orchestrator
      tag: latest
    env:
      LOG_LEVEL:
        value: INFO
      DATABASE_URL:
        value: postgres://estategap:replace-me@postgresql.databases.svc.cluster.local:5432/estategap?sslmode=require
      REDIS_URL:
        value: redis://redis.estategap-system.svc.cluster.local:6379
      HTTP_PORT:
        value: "8082"
      PORTAL_RELOAD_INTERVAL:
        value: 5m
      JOB_TTL:
        value: "86400"
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    serviceMonitor:
      enabled: true
      path: /health
      interval: 30s
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  proxy-manager:
    enabled: true
    namespace: estategap-scraping
    port: 50052
    metricsPort: 9090
    image:
      repository: ghcr.io/andrea-mucci/estategap/proxy-manager
      tag: latest
    env:
      LOG_LEVEL:
        value: INFO
      REDIS_URL:
        value: redis://redis.estategap-system.svc.cluster.local:6379
      GRPC_PORT:
        value: "50052"
      METRICS_PORT:
        value: "9090"
      BLACKLIST_TTL:
        value: "1800"
      STICKY_TTL:
        value: "600"
      HEALTH_THRESHOLD:
        value: "0.5"
      PROXY_COUNTRIES:
        value: IT,ES
      PROXY_IT_PROVIDER:
        value: brightdata
      PROXY_IT_ENDPOINT:
        value: zproxy.lum-superproxy.io:22225
      PROXY_IT_USERNAME:
        value: replace-me
      PROXY_IT_PASSWORD:
        value: replace-me
      PROXY_ES_PROVIDER:
        value: smartproxy
      PROXY_ES_ENDPOINT:
        value: gate.smartproxy.com:7000
      PROXY_ES_USERNAME:
        value: replace-me
      PROXY_ES_PASSWORD:
        value: replace-me
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  spider-workers:
    enabled: true
    namespace: estategap-scraping
    replicaCount: 1
    port: 9102
    metricsPort: 9102
    image:
      repository: ghcr.io/andrea-mucci/estategap/spider-workers
      tag: latest
    env:
      LOG_LEVEL:
        value: INFO
      REDIS_URL:
        value: redis://redis.estategap-system.svc.cluster.local:6379/0
      PROXY_MANAGER_ADDR:
        value: proxy-manager.estategap-scraping.svc.cluster.local:50052
      METRICS_PORT:
        value: "9102"
      REQUEST_MIN_DELAY:
        value: "2.0"
      REQUEST_MAX_DELAY:
        value: "5.0"
      MAX_CONCURRENT_PER_PORTAL:
        value: "3"
      SESSION_ROTATION_EVERY:
        value: "10"
      QUARANTINE_TTL_DAYS:
        value: "30"
      IDEALISTA_API_TOKEN:
        valueFrom:
          secretKeyRef:
            name: estategap-app-secrets
            key: IDEALISTA_API_TOKEN
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi
    keda:
      enabled: true
      minReplicas: 1
      maxReplicas: 50
      stream: scraper-commands
      consumer: estategap.spider-workers
      lagThreshold: "100"

  pipeline:
    enabled: true
    namespace: estategap-pipeline
    port: 8080
    image:
      repository: ghcr.io/andrea-mucci/estategap/pipeline
      tag: latest
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  pipeline-enricher:
    enabled: true
    namespace: estategap-pipeline
    port: 9103
    image:
      repository: ghcr.io/andrea-mucci/estategap/pipeline
      tag: latest
    command: ["python", "-m", "pipeline.enricher"]
    env:
      DATABASE_URL:
        value: postgres://estategap:replace-me@postgresql.databases.svc.cluster.local:5432/estategap?sslmode=require
      ENRICHER_CATASTRO_RATE_LIMIT:
        value: "1.0"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  pipeline-change-detector:
    enabled: true
    namespace: estategap-pipeline
    port: 9104
    image:
      repository: ghcr.io/andrea-mucci/estategap/pipeline
      tag: latest
    command: ["python", "-m", "pipeline.change_detector"]
    env:
      DATABASE_URL:
        value: postgres://estategap:replace-me@postgresql.databases.svc.cluster.local:5432/estategap?sslmode=require
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  ml-scorer:
    enabled: true
    namespace: estategap-intelligence
    port: 50051
    image:
      repository: ghcr.io/andrea-mucci/estategap/ml-scorer
      tag: latest
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      cpuTarget: 70

  ai-chat:
    enabled: true
    namespace: estategap-intelligence
    port: 50053
    metricsPort: 9090
    image:
      repository: ghcr.io/andrea-mucci/estategap/ai-chat
      tag: latest
    env:
      GRPC_PORT:
        value: "50053"
      METRICS_PORT:
        value: "9090"
      LLM_PROVIDER:
        value: claude
      FALLBACK_LLM_PROVIDER:
        value: openai
      LITELLM_MODEL:
        value: gpt-4o-mini
      API_GATEWAY_GRPC_ADDR:
        value: api-gateway.estategap-gateway.svc.cluster.local:8080
      LOG_LEVEL:
        value: INFO
      DATABASE_URL:
        valueFrom:
          secretKeyRef:
            name: ai-chat-secrets
            key: DATABASE_URL
      REDIS_URL:
        valueFrom:
          secretKeyRef:
            name: ai-chat-secrets
            key: REDIS_URL
      ANTHROPIC_API_KEY:
        valueFrom:
          secretKeyRef:
            name: ai-chat-secrets
            key: ANTHROPIC_API_KEY
      OPENAI_API_KEY:
        valueFrom:
          secretKeyRef:
            name: ai-chat-secrets
            key: OPENAI_API_KEY
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
    livenessProbe:
      httpGet:
        path: /metrics
        port: metrics
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 5
    readinessProbe:
      tcpSocket:
        port: grpc
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 8
      cpuTarget: 60

  frontend:
    enabled: true
    namespace: estategap-gateway
    port: 3000
    image:
      repository: ghcr.io/andrea-mucci/estategap/frontend
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
