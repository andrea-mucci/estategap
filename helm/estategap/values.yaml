stripe:
  successUrl: https://app.estategap.com/dashboard?checkout=success
  cancelUrl: https://app.estategap.com/pricing?checkout=cancelled
  portalReturnUrl: https://app.estategap.com/dashboard
  priceBasicMonthly: price_replace_basic_monthly
  priceBasicAnnual: price_replace_basic_annual
  priceProMonthly: price_replace_pro_monthly
  priceProAnnual: price_replace_pro_annual
  priceGlobalMonthly: price_replace_global_monthly
  priceGlobalAnnual: price_replace_global_annual
  priceApiMonthly: price_replace_api_monthly
  priceApiAnnual: price_replace_api_annual

mlTrainer:
  image:
    repository: ghcr.io/andrea-mucci/estategap/ml-trainer
    tag: latest
  schedule: "0 3 * * 0"
  prometheusPushgatewayUrl: ""
  resources:
    requests:
      memory: 4Gi
      cpu: "2"
    limits:
      memory: 8Gi
      cpu: "4"

mlScorer:
  grpcPort: 50051
  prometheusPort: 9091
  batchSize: 50
  batchFlushSeconds: 5
  modelPollIntervalSeconds: 60
  comparablesRefreshIntervalSeconds: 3600
  shapTimeoutSeconds: 2.0

gdpr:
  hardDeleteCron:
    enabled: true
    schedule: "0 2 * * *"
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    database:
      host: estategap-postgres-rw.estategap-system.svc.cluster.local
      port: "5432"
      userSecretRef:
        name: estategap-app-secrets
        key: username
      passwordSecretRef:
        name: estategap-app-secrets
        key: POSTGRES_PASSWORD
      databaseSecretRef:
        name: estategap-app-secrets
        key: dbname
    redis:
      host: redis.estategap-system.svc.cluster.local
      port: "6379"
      passwordSecretRef:
        name: redis-credentials
        key: redis-password

loadTests:
  enabled: false
  namespace: estategap-system
  image:
    repository: grafana/k6
    tag: latest
  apiBaseUrl: https://staging.estategap.com
  wsUrl: wss://staging.estategap.com/chat
  alertsTriggerUrl: https://staging.estategap.com/api/v1/internal/alerts/trigger
  natsHttpPublishUrl: ""
  prometheusRemoteWriteUrl: ""

services:
  api-gateway:
    enabled: true
    namespace: estategap-gateway
    replicaCount: 2
    port: 8080
    image:
      repository: ghcr.io/andrea-mucci/estategap/api-gateway
      tag: latest
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    env:
      PORT:
        value: "8080"
      LOG_LEVEL:
        value: INFO
      ALLOWED_ORIGINS:
        value: https://app.estategap.com
      CSP_REPORT_ONLY:
        value: "true"
      CSP_REPORT_URI:
        value: ""
      DB_PRIMARY_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: DB_PRIMARY_URL
      DB_REPLICA_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: DB_REPLICA_URL
      REDIS_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: REDIS_URL
      JWT_SECRET:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: JWT_SECRET
      GOOGLE_CLIENT_ID:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: GOOGLE_CLIENT_SECRET
      GOOGLE_REDIRECT_URL:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: GOOGLE_REDIRECT_URL
      STRIPE_SECRET_KEY:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: STRIPE_SECRET_KEY
      STRIPE_WEBHOOK_SECRET:
        valueFrom:
          secretKeyRef:
            name: api-gateway-secrets
            key: STRIPE_WEBHOOK_SECRET
      STRIPE_SUCCESS_URL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_SUCCESS_URL
      STRIPE_CANCEL_URL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_CANCEL_URL
      STRIPE_PORTAL_RETURN_URL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PORTAL_RETURN_URL
      STRIPE_PRICE_BASIC_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_BASIC_MONTHLY
      STRIPE_PRICE_BASIC_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_BASIC_ANNUAL
      STRIPE_PRICE_PRO_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_PRO_MONTHLY
      STRIPE_PRICE_PRO_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_PRO_ANNUAL
      STRIPE_PRICE_GLOBAL_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_GLOBAL_MONTHLY
      STRIPE_PRICE_GLOBAL_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_GLOBAL_ANNUAL
      STRIPE_PRICE_API_MONTHLY:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_API_MONTHLY
      STRIPE_PRICE_API_ANNUAL:
        valueFrom:
          configMapKeyRef:
            name: estategap-config
            key: STRIPE_PRICE_API_ANNUAL
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /readyz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 20
      cpuTarget: 60

  websocket-server:
    enabled: true
    namespace: estategap-gateway
    port: 8081
    image:
      repository: ghcr.io/andrea-mucci/estategap/websocket-server
      tag: latest
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  alert-engine:
    enabled: true
    namespace: estategap-notifications
    replicaCount: 1
    port: 8080
    image:
      repository: ghcr.io/andrea-mucci/estategap/alert-engine
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      DATABASE_URL:
        valueFrom:
          secretKeyRef:
            name: alert-engine-secrets
            key: DATABASE_URL
      DATABASE_REPLICA_URL:
        valueFrom:
          secretKeyRef:
            name: alert-engine-secrets
            key: DATABASE_REPLICA_URL
      REDIS_URL:
        valueFrom:
          secretKeyRef:
            name: alert-engine-secrets
            key: REDIS_URL
      NATS_URL:
        value: nats://nats.estategap-system.svc.cluster.local:4222
      RULE_CACHE_REFRESH_INTERVAL:
        value: 60s
      WORKER_POOL_SIZE:
        value: "0"
      BATCH_SIZE:
        value: "100"
      HEALTH_PORT:
        value: "8080"
      LOG_LEVEL:
        value: INFO
    livenessProbe:
      httpGet:
        path: /health/live
        port: http
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /health/ready
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s

  alert-dispatcher:
    enabled: true
    namespace: estategap-notifications
    replicaCount: 1
    port: 8081
    image:
      repository: ghcr.io/andrea-mucci/estategap/alert-dispatcher
      tag: latest
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    config:
      logLevel: INFO
      healthPort: 8081
      baseUrl: https://api.estategap.com
      workerPoolSize: 16
      batchSize: 50
      natsConsumerName: alert-dispatcher
      awsRegion: eu-west-1
      awsSesFromAddress: alerts@estategap.com
      awsSesFromName: EstateGap Alerts
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /readyz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s

  scrape-orchestrator:
    enabled: true
    namespace: estategap-scraping
    port: 8082
    image:
      repository: ghcr.io/andrea-mucci/estategap/scrape-orchestrator
      tag: latest
    env:
      LOG_LEVEL:
        value: INFO
      DATABASE_URL:
        value: postgres://estategap:replace-me@estategap-postgres-rw.estategap-system.svc.cluster.local:5432/estategap?sslmode=disable
      REDIS_URL:
        value: redis://redis.estategap-system.svc.cluster.local:6379
      NATS_URL:
        value: nats://nats.estategap-system.svc.cluster.local:4222
      HTTP_PORT:
        value: "8082"
      PORTAL_RELOAD_INTERVAL:
        value: 5m
      JOB_TTL:
        value: "86400"
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    serviceMonitor:
      enabled: true
      path: /health
      interval: 30s
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  proxy-manager:
    enabled: true
    namespace: estategap-scraping
    port: 50052
    metricsPort: 9090
    image:
      repository: ghcr.io/andrea-mucci/estategap/proxy-manager
      tag: latest
    env:
      LOG_LEVEL:
        value: INFO
      REDIS_URL:
        value: redis://redis.estategap-system.svc.cluster.local:6379
      GRPC_PORT:
        value: "50052"
      METRICS_PORT:
        value: "9090"
      BLACKLIST_TTL:
        value: "1800"
      STICKY_TTL:
        value: "600"
      HEALTH_THRESHOLD:
        value: "0.5"
      PROXY_COUNTRIES:
        value: IT,ES
      PROXY_IT_PROVIDER:
        value: brightdata
      PROXY_IT_ENDPOINT:
        value: zproxy.lum-superproxy.io:22225
      PROXY_IT_USERNAME:
        value: replace-me
      PROXY_IT_PASSWORD:
        value: replace-me
      PROXY_ES_PROVIDER:
        value: smartproxy
      PROXY_ES_ENDPOINT:
        value: gate.smartproxy.com:7000
      PROXY_ES_USERNAME:
        value: replace-me
      PROXY_ES_PASSWORD:
        value: replace-me
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  spider-workers:
    enabled: true
    namespace: estategap-scraping
    replicaCount: 1
    port: 9102
    metricsPort: 9102
    image:
      repository: ghcr.io/andrea-mucci/estategap/spider-workers
      tag: latest
    env:
      LOG_LEVEL:
        value: INFO
      NATS_URL:
        value: nats://nats.estategap-system.svc.cluster.local:4222
      REDIS_URL:
        value: redis://redis.estategap-system.svc.cluster.local:6379/0
      PROXY_MANAGER_ADDR:
        value: proxy-manager.estategap-scraping.svc.cluster.local:50052
      METRICS_PORT:
        value: "9102"
      REQUEST_MIN_DELAY:
        value: "2.0"
      REQUEST_MAX_DELAY:
        value: "5.0"
      MAX_CONCURRENT_PER_PORTAL:
        value: "3"
      SESSION_ROTATION_EVERY:
        value: "10"
      QUARANTINE_TTL_DAYS:
        value: "30"
      IDEALISTA_API_TOKEN:
        valueFrom:
          secretKeyRef:
            name: estategap-app-secrets
            key: IDEALISTA_API_TOKEN
    serviceMonitor:
