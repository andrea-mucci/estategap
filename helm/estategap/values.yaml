# -- Global chart settings shared by all rendered resources. Type: object. Required: no. Default: see child keys.
global:
# -- Override the storage class used by chart-managed PersistentVolumeClaims. Type: string. Required: no. Default: "".
  storageClass: ""
# -- Prefix every service image with a private or mirrored container registry. Type: string. Required: no. Default: "".
  imageRegistry: ""
# -- List of image pull secret names injected into pod specs. Type: list. Required: no. Default: [].
  imagePullSecrets: []

# -- Cluster-wide ingress and certificate settings. Type: object. Required: no. Default: see child keys.
cluster:
# -- Deployment environment injected into workloads and used by templates. Type: string. Required: yes. Default: staging. Example: production.
  environment: staging
# -- Base DNS domain used to build public ingress hostnames. Type: string. Required: yes. Default: estategap.com. Example: example.com.
  domain: estategap.com
# -- cert-manager issuer or ClusterIssuer name used for TLS certificates. Type: string. Required: no. Default: letsencrypt-staging. Example: letsencrypt-prod.
  certIssuer: letsencrypt-staging

# -- Feature flags for bundled infrastructure components. Type: object. Required: no. Default: see child keys.
components:
# -- Configure `components.redis` for this chart. Type: object. Required: no. Default: see child keys.
  redis:
# -- Deploy the bundled redis component from this chart. Type: bool. Required: no. Default: true.
    deploy: true
# -- Configure `components.mlflow` for this chart. Type: object. Required: no. Default: see child keys.
  mlflow:
# -- Deploy the bundled mlflow component from this chart. Type: bool. Required: no. Default: true.
    deploy: true
# -- Configure `components.kafka` for this chart. Type: object. Required: no. Default: see child keys.
  kafka:
# -- Deploy the bundled kafka component from this chart. Type: bool. Required: no. Default: false.
    deploy: false
# -- Configure `components.postgresql` for this chart. Type: object. Required: no. Default: see child keys.
  postgresql:
# -- Deploy the bundled postgresql component from this chart. Type: bool. Required: no. Default: false.
    deploy: false
# -- Configure `components.prometheus` for this chart. Type: object. Required: no. Default: see child keys.
  prometheus:
# -- Deploy the bundled prometheus component from this chart. Type: bool. Required: no. Default: false.
    deploy: false
# -- Configure `components.grafana` for this chart. Type: object. Required: no. Default: see child keys.
  grafana:
# -- Deploy the bundled grafana component from this chart. Type: bool. Required: no. Default: false.
    deploy: false

# -- Shared Kafka bootstrap and topic-initialization settings. Type: object. Required: no. Default: see child keys.
kafka:
# -- Kafka bootstrap broker list consumed by the topic-init Job and application config. Type: string. Required: yes. Default: kafka-bootstrap.kafka.svc.cluster.local:9092. Example: kafka-bootstrap.kafka.svc.cluster.local:9092.
  brokers: kafka-bootstrap.kafka.svc.cluster.local:9092
# -- Prefix prepended to managed Kafka topic names. Type: string. Required: yes. Default: estategap..
  topicPrefix: estategap.
# -- Configure `kafka.tls` for this chart. Type: object. Required: no. Default: see child keys.
  tls:
# -- Enable TLS for Kafka client connections. Type: bool. Required: no. Default: false.
    enabled: false
# -- Secret name that stores the Kafka CA certificate when TLS is enabled. Type: string. Required: no. Default: "".
    caSecret: ""
# -- Configure `kafka.sasl` for this chart. Type: object. Required: no. Default: see child keys.
  sasl:
# -- Enable SASL authentication for Kafka clients. Type: bool. Required: no. Default: false.
    enabled: false
# -- SASL mechanism for Kafka authentication. Type: string. Required: no. Default: PLAIN. Example: SCRAM-SHA-512.
    mechanism: PLAIN
# -- Secret containing KAFKA_SASL_USERNAME and KAFKA_SASL_PASSWORD. Type: string. Required: no. Default: "".
    credentialsSecret: ""
# -- Configure `kafka.consumer` for this chart. Type: object. Required: no. Default: see child keys.
  consumer:
# -- Maximum retry count exposed through the shared Kafka config map. Type: int. Required: no. Default: 3.
    maxRetries: 3
# -- Configure `kafka.topicInit` for this chart. Type: object. Required: no. Default: see child keys.
  topicInit:
# -- Render the Kafka topic initialization hook Job. Type: bool. Required: no. Default: true.
    enabled: true
# -- Replication factor used when the topic-init Job creates topics. Type: int. Required: no. Default: 3.
    replicationFactor: 3
# -- Configure `kafka.topicInit.image` for this chart. Type: object. Required: no. Default: see child keys.
    image:
# -- Container repository used by the topic-init Job. Type: string. Required: no. Default: bitnami/kafka.
      repository: bitnami/kafka
# -- Container tag used by the topic-init Job. Type: float. Required: no. Default: "3.7".
      tag: "3.7"
# -- Configure `kafka.deadLetter` for this chart. Type: object. Required: no. Default: see child keys.
  deadLetter:
# -- Create the dead-letter topic during chart installation. Type: bool. Required: no. Default: true.
    enabled: true
# -- Retention window for dead-letter topic data. Type: int. Required: no. Default: 30.
    retentionDays: 30

# -- External PostgreSQL endpoints and migration-job settings. Type: object. Required: no. Default: see child keys.
postgresql:
# -- Configure `postgresql.external` for this chart. Type: object. Required: no. Default: see child keys.
  external:
# -- Primary PostgreSQL writer hostname or service DNS name. Type: string. Required: yes. Default: postgresql.databases.svc.cluster.local.
    host: postgresql.databases.svc.cluster.local
# -- Primary PostgreSQL port. Type: int. Required: no. Default: 5432.
    port: 5432
# -- Application database name used by shared config. Type: string. Required: yes. Default: estategap.
    database: estategap
# -- PostgreSQL SSL mode passed to clients and migration hooks. Type: string. Required: no. Default: require. Example: verify-full.
    sslmode: require
# -- Secret containing PGUSER and PGPASSWORD for migrations. Type: string. Required: yes. Default: estategap-db-credentials.
    credentialsSecret: estategap-db-credentials
# -- Configure `postgresql.readReplica` for this chart. Type: object. Required: no. Default: see child keys.
  readReplica:
# -- Expose read-replica settings to workloads that support reader endpoints. Type: bool. Required: no. Default: false.
    enabled: false
# -- Read-replica PostgreSQL hostname or service DNS name. Type: string. Required: no. Default: postgresql-read.databases.svc.cluster.local.
    host: postgresql-read.databases.svc.cluster.local
# -- Read-replica PostgreSQL port. Type: int. Required: no. Default: 5432.
    port: 5432
# -- Configure `postgresql.migrations` for this chart. Type: object. Required: no. Default: see child keys.
  migrations:
# -- Run the Alembic migration Job on install and upgrade. Type: bool. Required: no. Default: true.
    enabled: true
# -- Image that must contain Alembic and the database migration scripts. Type: string. Required: no. Default: ghcr.io/andrea-mucci/estategap/pipeline:latest.
    image: ghcr.io/andrea-mucci/estategap/pipeline:latest
# -- activeDeadlineSeconds for the migration Job. Type: int. Required: no. Default: 300.
    timeout: 300

# -- Bitnami Redis sub-chart pass-through configuration. Type: object. Required: no. Default: see child keys.
redis:
# -- Override the Redis release name so workloads can resolve a stable DNS name. Type: string. Required: no. Default: redis.
  fullnameOverride: redis
# -- Bitnami Redis deployment mode. Type: string. Required: no. Default: replication.
  architecture: replication
# -- Configure `redis.auth` for this chart. Type: object. Required: no. Default: see child keys.
  auth:
# -- Enable Redis password authentication. Type: bool. Required: no. Default: true.
    enabled: true
# -- Existing Secret name that stores the Redis password. Type: string. Required: no. Default: redis-credentials.
    existingSecret: redis-credentials
# -- Key inside the Redis password Secret. Type: string. Required: no. Default: redis-password.
    existingSecretPasswordKey: redis-password
# -- Configure `redis.sentinel` for this chart. Type: object. Required: no. Default: see child keys.
  sentinel:
# -- Enable Redis Sentinel for failover. Type: bool. Required: no. Default: true.
    enabled: true
# -- Number of Sentinel votes required to authorize failover. Type: int. Required: no. Default: 2.
    quorum: 2
# -- Configure `redis.sentinel.service` for this chart. Type: object. Required: no. Default: see child keys.
    service:
# -- Configure `redis.sentinel.service.ports` for this chart. Type: object. Required: no. Default: see child keys.
      ports:
# -- Container port exposed by the Redis Sentinel `redis` service. Type: int. Required: no. Default: 6379.
        redis: 6379
# -- Container port exposed by the Redis Sentinel `sentinel` service. Type: int. Required: no. Default: 26379.
        sentinel: 26379
# -- Configure `redis.master` for this chart. Type: object. Required: no. Default: see child keys.
  master:
# -- Configure `redis.master.persistence` for this chart. Type: object. Required: no. Default: see child keys.
    persistence:
# -- Redis primary persistence setting `enabled`. Type: bool. Required: no. Default: true.
      enabled: true
# -- Redis primary persistence setting `size`. Type: string. Required: no. Default: 8Gi.
      size: 8Gi
# -- Configure `redis.master.resources` for this chart. Type: object. Required: no. Default: see child keys.
    resources:
# -- Configure `redis.master.resources.requests` for this chart. Type: object. Required: no. Default: see child keys.
      requests:
# -- Requested Redis primary cpu reservation. Type: string. Required: no. Default: 100m.
        cpu: 100m
# -- Requested Redis primary memory reservation. Type: string. Required: no. Default: 256Mi.
        memory: 256Mi
# -- Configure `redis.master.resources.limits` for this chart. Type: object. Required: no. Default: see child keys.
      limits:
# -- Maximum Redis primary memory allocation. Type: string. Required: no. Default: 1Gi.
        memory: 1Gi
# -- Configure `redis.replica` for this chart. Type: object. Required: no. Default: see child keys.
  replica:
# -- Configure `redis.replica.replicaCount` for this chart. Type: int. Required: no. Default: 1.
    replicaCount: 1
# -- Configure `redis.replica.persistence` for this chart. Type: object. Required: no. Default: see child keys.
    persistence:
# -- Redis replica persistence setting `enabled`. Type: bool. Required: no. Default: true.
      enabled: true
# -- Redis replica persistence setting `size`. Type: string. Required: no. Default: 8Gi.
      size: 8Gi
# -- Configure `redis.replica.resources` for this chart. Type: object. Required: no. Default: see child keys.
    resources:
# -- Configure `redis.replica.resources.requests` for this chart. Type: object. Required: no. Default: see child keys.
      requests:
# -- Requested Redis replica cpu reservation. Type: string. Required: no. Default: 100m.
        cpu: 100m
# -- Requested Redis replica memory reservation. Type: string. Required: no. Default: 256Mi.
        memory: 256Mi
# -- Configure `redis.replica.resources.limits` for this chart. Type: object. Required: no. Default: see child keys.
      limits:
# -- Maximum Redis replica memory allocation. Type: string. Required: no. Default: 1Gi.
        memory: 1Gi
# -- Multiline Redis server configuration appended to redis.conf. Type: string. Required: no. Default: multiline block.
  commonConfiguration: |
    maxmemory 1gb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

# -- Shared S3-compatible object storage settings. Type: object. Required: no. Default: see child keys.
s3:
# -- S3-compatible endpoint URL used by all object-storage clients. Type: string. Required: yes. Default: https://fsn1.your-objectstorage.com. Example: https://fsn1.your-objectstorage.com.
  endpoint: https://fsn1.your-objectstorage.com
# -- Region string passed to S3 SDK clients. Type: string. Required: yes. Default: fsn1.
  region: fsn1
# -- Prefix prepended to every logical EstateGap bucket name. Type: string. Required: yes. Default: estategap.
  bucketPrefix: estategap
# -- Force path-style S3 addressing for Hetzner or MinIO-compatible endpoints. Type: bool. Required: no. Default: true.
  forcePathStyle: true
# -- Secret containing AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY. Type: string. Required: yes. Default: estategap-s3-credentials.
  credentialsSecret: estategap-s3-credentials
# -- Configure `s3.buckets` for this chart. Type: object. Required: no. Default: see child keys.
  buckets:
# -- Bucket suffix used to store trained model artifacts. Type: string. Required: no. Default: ml-models.
    mlModels: ml-models
# -- Bucket suffix used to store training datasets. Type: string. Required: no. Default: training-data.
    trainingData: training-data
# -- Bucket suffix used to store listing photos. Type: string. Required: no. Default: listing-photos.
    listingPhotos: listing-photos
# -- Bucket suffix used to store GDPR export archives. Type: string. Required: no. Default: exports.
    exports: exports
# -- Bucket suffix used to store PostgreSQL backups. Type: string. Required: no. Default: backups.
    backups: backups

# -- Prometheus ServiceMonitor and alert-rule settings. Type: object. Required: no. Default: see child keys.
prometheus:
# -- Configure `prometheus.serviceMonitor` for this chart. Type: object. Required: no. Default: see child keys.
  serviceMonitor:
# -- Render ServiceMonitor resources for enabled services. Type: bool. Required: no. Default: true.
    enabled: true
# -- Default scrape interval for ServiceMonitor resources. Type: string. Required: no. Default: 15s.
    interval: 15s
# -- Configure `prometheus.serviceMonitor.labels` for this chart. Type: object. Required: no. Default: see child keys.
    labels:
# -- Selector label that must match the Prometheus operator serviceMonitorSelector. Type: string. Required: no. Default: prometheus.
      release: prometheus
# -- Configure `prometheus.rules` for this chart. Type: object. Required: no. Default: see child keys.
  rules:
# -- Render PrometheusRule alerts for EstateGap. Type: bool. Required: no. Default: true.
    enabled: true
# -- Configure `prometheus.rules.labels` for this chart. Type: object. Required: no. Default: see child keys.
    labels:
# -- Selector label that must match the Prometheus operator rule selector. Type: string. Required: no. Default: prometheus.
      release: prometheus

# -- Grafana dashboard ConfigMap import settings. Type: object. Required: no. Default: see child keys.
grafana:
# -- Configure `grafana.dashboards` for this chart. Type: object. Required: no. Default: see child keys.
  dashboards:
# -- Render dashboard ConfigMaps for Grafana sidecar discovery. Type: bool. Required: no. Default: true.
    enabled: true
# -- Namespace watched by the Grafana dashboard sidecar. Type: string. Required: no. Default: monitoring.
    namespace: monitoring
# -- Configure `grafana.dashboards.labels` for this chart. Type: object. Required: no. Default: see child keys.
    labels:
# -- Label value the Grafana sidecar watches to import dashboards. Type: int. Required: no. Default: "1".
      grafana_dashboard: "1"

# -- Configure `keda` for this chart. Type: object. Required: no. Default: see child keys.
keda:
# -- Enable KEDA-specific rendered resources such as the spider-workers ScaledObject. Type: bool. Required: no. Default: true.
  enabled: true

# -- Optional Argo CD Application manifest settings. Type: object. Required: no. Default: see child keys.
argocd:
# -- Render the Argo CD Application resource. Type: bool. Required: no. Default: true.
  enabled: true
# -- Metadata name for the Argo CD Application object. Type: string. Required: no. Default: estategap-staging.
  applicationName: estategap-staging
# -- Canonical Git repository URL that Argo CD syncs from. Type: string. Required: no. Default: "".
  repoURL: ""
# -- Git revision Argo CD tracks. Type: string. Required: no. Default: main.
  targetRevision: main
# -- List of Helm values files Argo CD passes to the release. Type: object. Required: no. Default: see child keys.
  valueFiles:
    - values-staging.yaml
# -- Configure `argocd.syncPolicy` for this chart. Type: object. Required: no. Default: see child keys.
  syncPolicy:
# -- Allow Argo CD to delete resources removed from Git. Type: bool. Required: no. Default: false.
    prune: false
# -- Allow Argo CD to auto-correct drift detected in the cluster. Type: bool. Required: no. Default: true.
    selfHeal: true

